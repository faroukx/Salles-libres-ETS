<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salles libres ÉTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ets: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .room-card { transition: all 0.2s ease; }
        .room-card:hover { transform: translateY(-4px); }
        .filter-btn.active { background-color: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
        .state-btn.active.libre { background-color: #22c55e; color: white; }
        .state-btn.active.occupe { background-color: #ef4444; color: white; }
        
        /* Custom Scrollbar */
        .dark ::-webkit-scrollbar { width: 8px; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* Timeline Styles */
        .timeline-bar { height: 6px; border-radius: 3px; overflow: hidden; display: flex; background: #e2e8f0; }
        .dark .timeline-bar { background: #334155; }
        .timeline-segment { height: 100%; transition: width 0.3s ease; }
        .timeline-free { background: #22c55e; }
        .timeline-busy { background: #ef4444; }

        /* Fix Select Dark Mode */
        select option { background-color: white; color: black; }
        .dark select option { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="min-h-screen pb-12 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors">
    <!-- Header -->
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30 transition-colors shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-red-600 p-2 rounded-xl shadow-lg shadow-red-600/20">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 dark:text-white hidden sm:block">Salles libres <span class="text-red-600 font-black">ÉTS</span></h1>
            </div>
            
            <div class="flex items-center space-x-2 sm:space-x-4">
                <!-- Quick Find -->
                <button id="quick-find" class="bg-red-600 hover:bg-red-700 text-white text-xs sm:text-sm px-3 sm:px-5 py-2 rounded-full font-bold transition-all flex items-center shadow-lg shadow-red-600/30">
                    <i class="fas fa-bolt mr-2"></i>Urgence Étude
                </button>

                <div class="h-6 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>

                <!-- Theme & View -->
                <div class="flex items-center space-x-2">
                    <button id="theme-toggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                    <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                        <button id="view-grid" class="p-2 rounded-lg transition-all bg-white dark:bg-slate-700 shadow-sm"><i class="fas fa-th-large"></i></button>
                        <button id="view-list" class="p-2 rounded-lg transition-all"><i class="fas fa-list"></i></button>
                    </div>
                </div>

                <a href="https://www.etsmtl.ca/etudier-a-lets/inscription-aux-cours/horaire-cours" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white p-2 sm:px-4 sm:py-2 rounded-xl font-medium transition-colors text-xs sm:text-sm">
                    <i class="fas fa-calendar-alt sm:mr-2"></i><span class="hidden sm:inline">Horaire Officiel</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <!-- Dashboard / Filtres -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 mb-8 shadow-xl shadow-slate-200/50 dark:shadow-none transition-colors">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Section Recherche & Temps -->
                <div class="lg:col-span-4 space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-3">Recherche Intelligente</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="search-input" placeholder="Local, cours, pavillon..." class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all outline-none text-slate-800 dark:text-white font-medium">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-2">Date</label>
                            <input type="date" id="date-input" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none text-sm font-bold dark:text-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-2">Heure</label>
                            <input type="time" id="time-input" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none text-sm font-bold dark:text-white">
                        </div>
                    </div>
                </div>

                <!-- Section Pavillons & Densité -->
                <div class="lg:col-span-5">
                    <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-4">Pavillons & Densité d'occupation</label>
                    <div class="grid grid-cols-3 sm:grid-cols-6 gap-3" id="pavillon-filters">
                        <div class="space-y-2">
                            <button data-pav="ALL" class="filter-btn active w-full py-3 rounded-2xl text-sm font-black transition-all bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">Tous</button>
                            <div class="h-1 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div id="density-ALL" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div></div>
                        </div>
                        <div class="space-y-2">
                            <button data-pav="A" class="filter-btn w-full py-3 rounded-2xl text-sm font-black transition-all bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">A</button>
                            <div class="h-1 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div id="density-A" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div></div>
                        </div>
                        <div class="space-y-2">
                            <button data-pav="B" class="filter-btn w-full py-3 rounded-2xl text-sm font-black transition-all bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">B</button>
                            <div class="h-1 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div id="density-B" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div></div>
                        </div>
                        <div class="space-y-2">
                            <button data-pav="D" class="filter-btn w-full py-3 rounded-2xl text-sm font-black transition-all bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">D</button>
                            <div class="h-1 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div id="density-D" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div></div>
                        </div>
                        <div class="space-y-2">
                            <button data-pav="E" class="filter-btn w-full py-3 rounded-2xl text-sm font-black transition-all bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">E</button>
                            <div class="h-1 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div id="density-E" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div></div>
                        </div>
                    </div>
                </div>

                <!-- Section État -->
                <div class="lg:col-span-3">
                    <label class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-4">État de la salle</label>
                    <div class="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl">
                        <button data-state="ALL" class="state-btn active w-full py-2.5 rounded-xl text-xs font-black transition-all">TOUT</button>
                        <button data-state="FREE" class="state-btn libre w-full py-2.5 rounded-xl text-xs font-black transition-all">LIBRE</button>
                        <button data-state="BUSY" class="state-btn occupe w-full py-2.5 rounded-xl text-xs font-black transition-all">OCCUPÉ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Résultats -->
        <div id="rooms-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Les cartes de salles seront injectées ici -->
        </div>

        <!-- État vide -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="bg-slate-100 dark:bg-slate-800 p-8 rounded-full mb-6">
                <i class="fas fa-search text-4xl text-slate-300 dark:text-slate-600"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2">Aucune salle trouvée</h3>
            <p class="text-slate-500 dark:text-slate-400 max-w-xs">Essayez de modifier vos filtres ou votre recherche.</p>
        </div>
    </main>

    <script>
        // État global
        let allRooms = [];
        let currentPavillon = 'ALL';
        let currentState = 'ALL';
        let currentView = 'grid';

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date/time
            const now = new Date();
            document.getElementById('date-input').value = now.toISOString().split('T')[0];
            document.getElementById('time-input').value = now.toTimeString().slice(0, 5);

            // Event Listeners
            document.getElementById('search-input').addEventListener('input', filterRooms);
            document.getElementById('date-input').addEventListener('change', fetchRooms);
            document.getElementById('time-input').addEventListener('change', fetchRooms);
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPavillon = btn.dataset.pav;
                    filterRooms();
                });
            });

            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentState = btn.dataset.state;
                    filterRooms();
                });
            });

            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('view-grid').addEventListener('click', () => setView('grid'));
            document.getElementById('view-list').addEventListener('click', () => setView('list'));
            document.getElementById('quick-find').addEventListener('click', findUrgentRoom);

            // Initial fetch
            fetchRooms();
            
            // Auto-refresh every minute
            setInterval(fetchRooms, 60000);
        });

        async function fetchRooms() {
            const date = document.getElementById('date-input').value;
            const time = document.getElementById('time-input').value;
            
            try {
                const response = await fetch(`/api/v1/available-rooms?date=${date}&time=${time}`);
                allRooms = await response.json();
                updateDensities();
                filterRooms();
            } catch (error) {
                console.error('Erreur lors de la récupération des salles:', error);
            }
        }

        function updateDensities() {
            const pavillons = ['ALL', 'A', 'B', 'D', 'E'];
            pavillons.forEach(pav => {
                const rooms = pav === 'ALL' ? allRooms : allRooms.filter(r => r.room_name.startsWith(pav));
                if (rooms.length === 0) return;
                const busy = rooms.filter(r => !r.is_available).length;
                const density = (busy / rooms.length) * 100;
                const bar = document.getElementById(`density-${pav}`);
                if (bar) bar.style.width = `${density}%`;
            });
        }

        function filterRooms() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = allRooms.filter(room => {
                const matchesSearch = room.room_name.toLowerCase().includes(searchTerm);
                const matchesPavillon = currentPavillon === 'ALL' || room.room_name.startsWith(currentPavillon);
                const matchesState = currentState === 'ALL' || 
                                   (currentState === 'FREE' && room.is_available) || 
                                   (currentState === 'BUSY' && !room.is_available);
                
                return matchesSearch && matchesPavillon && matchesState;
            });

            renderRooms(filtered);
        }

        function findUrgentRoom() {
            const freeRooms = allRooms.filter(r => r.is_available);
            if (freeRooms.length > 0) {
                // Trier par pavillon A, B, D, E
                freeRooms.sort((a, b) => a.room_name.localeCompare(b.room_name));
                renderRooms([freeRooms[0]]);
                document.getElementById('search-input').value = freeRooms[0].room_name;
            } else {
                alert("Désolé, aucune salle n'est libre actuellement !");
            }
        }

        function renderRooms(rooms) {
            const container = document.getElementById('rooms-container');
            const emptyState = document.getElementById('empty-state');
            
            if (rooms.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            if (currentView === 'grid') {
                container.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6";
                container.innerHTML = rooms.map(room => `
                    <div class="room-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm hover:shadow-xl transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-2xl font-black text-slate-800 dark:text-white">${room.room_name}</h3>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Pavillon ${room.room_name[0]}</p>
                            </div>
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter ${room.is_available ? 'bg-green-100 text-green-600 dark:bg-green-900/30' : 'bg-red-100 text-red-600 dark:bg-red-900/30'}">
                                ${room.is_available ? 'Libre' : 'Occupé'}
                            </span>
                        </div>
                        
                        ${!room.is_available && room.current_course ? `
                            <div class="mb-6 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                                <div class="flex items-center text-red-500 mb-2">
                                    <i class="fas fa-graduation-cap mr-2 text-xs"></i>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Cours en cours</span>
                                </div>
                                <p class="font-bold text-slate-700 dark:text-slate-200">${room.current_course}</p>
                            </div>
                        ` : `
                            <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/10 rounded-2xl border border-green-100 dark:border-green-900/20">
                                <div class="flex items-center text-green-600 mb-1">
                                    <i class="fas fa-check-circle mr-2 text-xs"></i>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Disponible</span>
                                </div>
                                <p class="text-xs text-green-700 dark:text-green-400 font-medium">Aucun cours pour le moment</p>
                            </div>
                        `}

                        <div class="space-y-4">
                            <div class="timeline-bar">
                                <div class="timeline-segment ${room.is_available ? 'timeline-free' : 'timeline-busy'}" style="width: 100%"></div>
                            </div>
                            <div class="flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <div class="flex items-center">
                                    <i class="far fa-clock mr-2"></i>
                                    <span>Prochain: ${room.next_course_time || 'Aucun'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.className = "flex flex-col space-y-3";
                container.innerHTML = rooms.map(room => `
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 flex items-center justify-between shadow-sm">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-black text-slate-700 dark:text-slate-300">
                                ${room.room_name}
                            </div>
                            <div>
                                <p class="font-bold text-slate-800 dark:text-white">${room.is_available ? 'Libre' : room.current_course}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">Prochain: ${room.next_course_time || 'N/A'}</p>
                            </div>
                        </div>
                        <span class="w-3 h-3 rounded-full ${room.is_available ? 'bg-green-500 shadow-lg shadow-green-500/50' : 'bg-red-500 shadow-lg shadow-red-500/50'}"></span>
                    </div>
                `).join('');
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        function setView(view) {
            currentView = view;
            document.getElementById('view-grid').classList.toggle('bg-white', view === 'grid');
            document.getElementById('view-grid').classList.toggle('dark:bg-slate-700', view === 'grid');
            document.getElementById('view-list').classList.toggle('bg-white', view === 'list');
            document.getElementById('view-list').classList.toggle('dark:bg-slate-700', view === 'list');
            filterRooms();
        }
    </script>
</body>
</html>
